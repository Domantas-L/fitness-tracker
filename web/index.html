<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header class="nav-header">
        <nav class="nav-bar">
            <div class="nav-start">
                <a href="#" class="nav-btn">main menu</a>
            </div>
            <div>
                <input type="text" placeholder="Search" class="nav-search-bar">
                <button class="nav-create-btn">Create</button>
            </div>
            <div>
                <a href="#" class="nav-btn">
                    <span>Inbox</span>
                    <a href="#" class="nav-btn">Account information</a>
            </div>
        </nav>
    </header>
    <main>
        <section aria-labelledby="Board-area" class="Board">
            <section class="single-board" id ="Board">
                <header class="Board-header">
                    <button type="button" class="Board-name-btn">Today</button>
                    <input type="text" class="column-name-input" value="Today" aria-label="Column name" hidden id="Board_name">
                    <span class="Task-counter">1</span>
                </header>
                <article>
                    <article class="top-List-items-display">
                        <div class="top-list-item">
                            <div class="List-task-text">
                                <span> Name of project</span>
                            </div>
                            <div class="List-task-text">
                                <span> Start-time</span>
                            </div>
                            <div class="List-task-text">
                                <span> Estamated end time</span>
                            </div>
                            <div class="List-btn-display">
                            </div>
                        </div>
                    </article>
                    <ul class="List-items-display" id="Today-List">
                    </ul>
                </article>
                <footer class="List-footer">
                    <div>
                        <button type="button" class="Add-btn" id="open-form-btn">+ Add a card</button>
                    </div>
                </footer>
            </section>

            <section>
                <button class="Add-list-btn">+ Add another list</button>
            </section>
        </section>
        <section aria-labelledby="calender-area">
            <p>
                Place for a calender later
            </p>
        </section>

    </main>

    <section id="form-overlay" class="form-overlay hidden">
        <form id="task_form" class="floating_form">
            <h3>Add a new task</h3>
            <input type="text" id="Task_name" placeholder="Enter task's name" required>
            <input type="time" id="Task_Start_time" required>
            <input type="time" id="Task_End_time" required>

            <article class="Form-action">
                <button type="submit" class="List-btn">Save </button>
                <button type="button" id="Close-form-btn" class="List-btn">Close</button>
            </article>

        </form>

    </section>
    <script src="Script.js"></script>
</body>

</html>
